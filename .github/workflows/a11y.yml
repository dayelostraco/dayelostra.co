name: Accessibility

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - run: npm run build

      - name: Check internal links in built site
        run: npm run links:check

      - name: Serve build and run axe-core audit
        run: |
          npm run preview &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4321 >/dev/null && break
            sleep 1
          done
          npm run a11y:test
        env:
          A11Y_URL: http://localhost:4321/
