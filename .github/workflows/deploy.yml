name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for AWS OIDC

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Render per-post OG cards
        run: npm run og:render:posts

      - run: npm run build

      # The accessibility statement promises that a build with any WCAG A/AA
      # violation does not ship. This gate makes that literally true: the
      # deploy stops here on violations instead of racing the parallel
      # Accessibility workflow. Chromium is already installed above for the
      # OG render step.
      - name: Accessibility gate (blocks deploy on violations)
        run: |
          npm run preview &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4321 >/dev/null && break
            sleep 1
          done
          npm run a11y:test
        env:
          A11Y_URL: http://localhost:4321/

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: us-east-1

      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync ./dist s3://dayelostra.co --delete \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML (short cache)
        run: |
          aws s3 cp ./dist s3://dayelostra.co --recursive \
            --exclude "*" --include "*.html" \
            --cache-control "public, max-age=300, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Sync XML and text files (short cache)
        run: |
          aws s3 cp ./dist s3://dayelostra.co --recursive \
            --exclude "*" --include "*.xml" --include "*.txt" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
