<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Base navy + topographic gradient -->
  <defs>
    <radialGradient id="g1" cx="20%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#004069" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0e2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#5c4520" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a0e2a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0a0e2a"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Topographic flow lines (subtle) -->
  <g fill="none" stroke="#00adef" stroke-width="0.8" opacity="0.18">
    <path d="M-30,120 Q200,80 420,140 T780,120 T1230,160"/>
    <path d="M-30,200 Q220,160 440,220 T800,200 T1230,240"/>
    <path d="M-30,470 Q240,430 480,490 T840,470 T1230,510"/>
    <path d="M-30,540 Q260,500 500,560 T860,540 T1230,580"/>
  </g>
  <g fill="none" stroke="#c1a066" stroke-width="0.7" opacity="0.16">
    <path d="M-30,330 Q300,290 600,350 T1230,330"/>
  </g>

  <!-- Corner brackets, top-left + bottom-right -->
  <g fill="none" stroke="#00adef" stroke-width="2" opacity="0.6">
    <path d="M40,80 V40 H100"/>
    <path d="M1160,590 H1100 M1160,590 V550"/>
  </g>

  <!-- Cyan / mark, top-left -->
  <g transform="translate(60, 100)">
    <line x1="32" y1="0" x2="0" y2="46" stroke="#00adef" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Eyebrow above name -->
  <text x="60" y="206" font-family="ui-monospace, 'IBM Plex Mono', monospace"
        font-size="22" font-weight="500" letter-spacing="6" fill="#00adef">
    DAYELOSTRA.CO
  </text>

  <!-- Name (large, parchment) -->
  <text x="60" y="335" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="120" font-weight="600" fill="#ebe5d5" letter-spacing="-2">
    Dayel Ostraco
  </text>

  <!-- Title line (mixed: cream + cyan AI accent) -->
  <text x="60" y="420" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="46" font-weight="500" fill="#ebe5d5">
    Full Stack <tspan fill="#00adef">AI</tspan> Engineer
    <tspan fill="#939598" dx="6">·</tspan>
    Secure Systems Architect
  </text>

  <!-- Classification banner near bottom -->
  <g transform="translate(60, 530)">
    <rect width="540" height="50" rx="0" fill="#00adef"/>
    <text x="270" y="33" text-anchor="middle"
          font-family="ui-monospace, 'IBM Plex Mono', monospace"
          font-size="20" font-weight="600" letter-spacing="5" fill="#0a0e2a">
      // CISSP // AWS SAA // DOD SECRET //
    </text>
  </g>

  <!-- URL bottom-right -->
  <text x="1140" y="568" text-anchor="end" font-family="ui-monospace, 'IBM Plex Mono', monospace"
        font-size="22" font-weight="500" letter-spacing="4" fill="#ebe5d5" opacity="0.6">
    <tspan fill="#00adef">/ </tspan>dayelostra.co
  </text>
</svg>
