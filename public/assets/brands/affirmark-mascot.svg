<!-- Sigillarium — Wax-Seal Raven — Painterly Mascot -->
<!-- Usage: dark / parchment grounds. Wax Crimson primary; black-navy plumage. -->
<!-- SigilArk Brand Family — April 2026 -->
<!-- v1: vector-traced from a hand-illustrated source via VTracer 0.6.12. -->
<!--     Eye composition is deliberately two-pixel — bright frost catch-light upper-right -->
<!--     (#F6F1E4) plus the SigilArk gold parent-brand callback lower-left (#AA8B4E). -->
<!--     No dim secondary highlight, by design — the wax-seal-impression aesthetic reads -->
<!--     sharper with a single bright catch + gold callback than with the three-pixel -->
<!--     "alive" register the owl and boar carry. The colophon owl and vallark boar -->
<!--     retain their three-pixel treatment; the sigillarium raven is a deliberate variation. -->
<!--     Whitespace trimmed from the original 1254×1254 canvas to a tight content-bounds -->
<!--     viewBox. Raw VTracer colors preserved (eye socket #141722, catch-light #F6F1E4, -->
<!--     gold #AA8B4E) — Sigillarium-internal palette, not snapped to the cross-family -->
<!--     Sigil Dark / Parchment / Sigil Gold tokens, deliberately. The Wax Crimson body -->
<!--     palette (#650F1B–#881626) is the Sigillarium-specific palette zone. -->
